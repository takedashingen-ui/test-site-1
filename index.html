<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>テストやねん</title>
    <style>
    /* サイト全体の背景を薄いグレーにして、白を際立たせる */
    body { 
        background-color: #f0f0f2; 
        text-align: center; 
        font-family: 'Helvetica Neue', Arial, sans-serif; /* 少し都会的なフォントに */
        padding-top: 50px; 
    }

    /* 見出し（h1）をオリックス・ネイビーの帯に */
    h1 { 
        color: #ffffff;               /* 文字は白 */
        background-color: #001e43;    /* 背景は濃いネイビー（オリックス紺） */
        font-size: 80px; 
        padding: 20px 0;              /* 帯の上下に少し余白を作る */
        text-transform: uppercase;   /* 英字があれば大文字に（プロっぽくなります） */
        <div style="margin-top: 20px;">
    <img src="VRChat_2026-03-30_04-03-51.504_1920x1080.png" alt="VRChatの思い出" style="max-width: 100%; height: auto; border: 2px solid #001e43; border-radius: 10px;">
    <p style="color: #333; font-weight: bold;">お気に入りのVRChatアバターです！</p>
</div>
    }

    /* 文章（p）をゴールド（金）に */
    p { 
        font-size: 24px; 
        color: #b3995d;               /* 落ち着いたゴールド（バファローズ金） */
        font-weight: bold;           /* 少し太字にして力強く */
    }
</style>
</head>
<body>
    <h1>はじめまして</h1>
    <p>初めて作ったお</p>
    <p>国粋主義者だから英語わからん</p>
    <a href="https://www.buffaloes.co.jp/" target="_blank">神は我々に語りかけている</a>
</body>
</html>
